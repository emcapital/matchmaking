<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmashMatch - Team Operational Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Global Structural Overrides */
        body { transition: font-family 0.25s ease; }
        .toast-transition { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between antialiased relative overflow-x-hidden" id="body-overlay">

    <!-- Ambient Grid & Hyper-Focused Lighting Orbs -->
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:3rem_3rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_80%,transparent_100%)] z-0 opacity-20"></div>
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 opacity-30">
        <div class="absolute -top-60 -left-60 w-[40rem] h-[40rem] bg-emerald-500/10 rounded-full filter blur-[160px]"></div>
        <div class="absolute top-1/3 -right-60 w-[40rem] h-[40rem] bg-cyan-500/10 rounded-full filter blur-[160px]"></div>
    </div>

    <!-- Main Fluid Full-Width Module Frame -->
    <main class="flex-grow flex items-center justify-center p-3 sm:p-6 lg:p-10 z-10 relative w-full">
        <div id="main-content-card" class="w-full xl:max-w-[1920px] mx-auto bg-slate-900/25 backdrop-blur-2xl rounded-3xl p-4 sm:p-6 lg:p-10 border border-slate-800/40 shadow-[0_30px_70px_rgba(0,0,0,0.7)]">
            
            <!-- Structural Hub Header -->
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 lg:mb-8 pb-6 border-b border-slate-800/40">
                <div class="flex flex-col sm:flex-row items-center gap-4 text-center sm:text-left w-full sm:w-auto">
                    <div class="inline-flex items-center justify-center w-14 h-14 bg-slate-950 border border-slate-800/80 text-emerald-400 rounded-2xl shadow-[0_0_20px_rgba(16,185,129,0.08)] shrink-0">
                        <i id="team-hub-icon" class="fa-solid fa-users text-xl"></i>
                    </div>
                    <div>
                        <h1 id="team-name" class="text-xl sm:text-2xl font-bold tracking-tight text-white drop-shadow-sm">Loading Node...</h1>
                        <p id="team-division" class="text-slate-500 text-[9px] font-bold tracking-widest uppercase mt-1 flex items-center justify-center sm:justify-start gap-1.5">
                            <span class="w-1 h-1 rounded-full bg-slate-700"></span> Core System Matrix
                        </p>
                    </div>
                </div>
                <a href="../index.html" class="w-full sm:w-auto bg-slate-950 hover:bg-slate-900 border border-slate-800/80 hover:border-slate-700 text-slate-400 hover:text-slate-200 px-4 py-2.5 rounded-xl text-xs font-semibold tracking-wider uppercase transition-colors flex items-center justify-center gap-2 shadow-sm">
                    <i class="fa-solid fa-power-off text-[10px] text-rose-500/80"></i> Exit Hub
                </a>
            </div>

            <!-- Two-Column Dynamic Split Grid (Optimized Multi-Device Layout) -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
                
                <!-- COLUMN 1: Profile Details & Controls (Responsive Stack) -->
                <div class="lg:col-span-3 space-y-4 lg:space-y-6">
                    
                    <!-- Interactive Typography Panel -->
                    <div class="bg-slate-950/50 border border-slate-900/80 p-4 rounded-2xl shadow-inner">
                        <div class="flex items-center gap-2 mb-3">
                            <i class="fa-solid fa-font text-xs text-cyan-500"></i>
                            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Interface Typography</h2>
                        </div>
                        <div class="relative">
                            <select id="font-selector" onchange="handleFontChange(this.value)" class="w-full bg-slate-900/90 border border-slate-800 hover:border-slate-700 text-slate-200 text-xs rounded-xl px-3.5 py-2.5 outline-none appearance-none cursor-pointer focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/20 transition-all font-sans">
                                <option value="Poppins">Poppins (Modern Clean)</option>
                                <option value="Share Tech Mono">Share Tech Mono (Terminal)</option>
                                <option value="Inter">Inter (Sleek UI)</option>
                                <option value="Orbitron">Orbitron (Cyber Tech)</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                                <i class="fa-solid fa-chevron-down text-[10px]"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Active Roster Panel -->
                    <div class="bg-slate-950/40 border border-slate-900/60 p-4 rounded-2xl">
                        <div class="flex items-center gap-2 mb-4 pb-2 border-b border-slate-900/60">
                            <i class="fa-solid fa-address-card text-xs text-slate-600"></i>
                            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Roster Deployment</h2>
                        </div>
                        <div id="players-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-2">
                            <!-- Dynamic Injection Target for Players -->
                        </div>
                    </div>
                </div>

                <!-- COLUMN 2: Analytics Standings & Live Match Feeds -->
                <div class="lg:col-span-9 space-y-6">
                    
                    <!-- Advanced Performance Index Panel -->
                    <div class="bg-slate-950/60 border border-slate-900 p-4 sm:p-5 rounded-2xl">
                        <div class="flex items-center gap-2 mb-4 pb-2 border-b border-slate-900/40">
                            <i class="fa-solid fa-chart-simple text-xs text-slate-600"></i>
                            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">System Matrix Leaderboard</h2>
                        </div>
                        <div id="standing-panel" class="flex flex-col sm:flex-row justify-around items-center gap-4 sm:gap-2 text-center">
                            <!-- Dynamic Analytics Metrics -->
                        </div>
                    </div>

                    <!-- Pending Match Allocations Dashboard -->
                    <div>
                        <div class="flex items-center gap-2 mb-3 px-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.5)] animate-pulse"></span>
                            <h2 class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Pending Match Collisions</h2>
                        </div>
                        <div id="upcoming-matches-container" class="space-y-2.5">
                            <!-- Dynamic Upcoming Schedules -->
                        </div>
                    </div>

                    <!-- Archived Historic Match Logs -->
                    <div class="pt-2">
                        <div class="flex items-center gap-2 mb-3 px-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span>
                            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Archived Match Logs</h2>
                        </div>
                        <div id="past-matches-container" class="space-y-2">
                            <!-- Dynamic Historical Scores -->
                        </div>
                    </div>
                    
                </div>
            </div>

        </div>
    </main>

    <!-- UI Notification Stack Overlay -->
    <div class="fixed bottom-4 right-4 left-4 sm:left-auto sm:w-80 z-50 pointer-events-none">
        <div id="toast-container" class="space-y-2 flex flex-col justify-end items-end w-full"></div>
    </div>

    <!-- Platform Ecosystem Footer -->
    <footer class="w-full text-center p-4 border-t border-slate-900/60 bg-slate-950 text-[9px] font-bold tracking-widest text-slate-600 uppercase">
        &copy; SmashMatch Core Platform Engine
    </footer>

    <!-- Core Interactive Execution Logic -->
    <script>
        const ecosystemDatabase = {
            "matrix-alpha": {
                name: "Apex Smashers Clan",
                icon: "fa-solid fa-bolt",
                division: "Pro Matrix Division I",
                fontName: "Poppins",
                standing: { rank: "2nd", points: "420 PTS", winLoss: "14W - 3L" },
                players: [
                    { name: "Marcus 'Vortex' Tan", role: "Captain / Singles", rank: "Tier S" },
                    { name: "Sarah 'Aero' Lin", role: "Mixed Doubles Expert", rank: "Tier S" },
                    { name: "David 'Smash' K.", role: "Rear Court Attacker", rank: "Tier A+" },
                    { name: "Chloe 'Net' Wong", role: "Front Court Playmaker", rank: "Tier A" }
                ],
                matches: [
                    { type: "upcoming", opponent: "Viper Volley BC", court: "Court A - Alpha Center", date: "June 24, 2026", time: "19:00", tier: "Championship Line" },
                    { type: "upcoming", opponent: "Cyber Shuttle Club", court: "Court C - Neon Hub", date: "June 28, 2026", time: "21:30", tier: "Ecosystem Cup" },
                    { type: "past", opponent: "Quantum Rackets", court: "Court B - Nexus Arena", score: "21-18, 21-14", outcome: "victory", date: "June 15, 2026" },
                    { type: "past", opponent: "Titan Racqueteers", court: "Main Stadium Arena", score: "19-21, 20-22", outcome: "defeat", date: "June 08, 2026" }
                ]
            },
            "matrix-beta": {
                name: "Neon Netrunners",
                icon: "fa-solid fa-shield-halved",
                division: "Challenger Matrix Division II",
                fontName: "Share Tech Mono",
                standing: { rank: "5th", points: "290 PTS", winLoss: "9W - 8L" },
                players: [
                    { name: "Alex 'Drive' Mercer", role: "Captain / Singles", rank: "Tier A+" },
                    { name: "Elena 'Drop' Petrova", role: "Net Controller", rank: "Tier A" },
                    { name: "Kenji 'Apex' Sato", role: "Defensive Anchor", rank: "Tier B+" }
                ],
                matches: [
                    { type: "upcoming", opponent: "Sonic Drop BC", court: "Court B - Nexus Arena", date: "June 25, 2026", time: "18:00", tier: "Challenger Series" },
                    { type: "past", opponent: "Apex Smashers Clan", court: "Court A - Alpha Center", score: "21-19, 17-21, 21-15", outcome: "victory", date: "June 12, 2026" }
                ]
            }
        };

        const fontLibrary = {
            "Poppins": "https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap",
            "Share Tech Mono": "https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap",
            "Inter": "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap",
            "Orbitron": "https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
        };

        function injectDynamicFont(name) {
            const url = fontLibrary[name];
            if (!url) return;
            
            const fontId = `dynamic-font-${name.replace(/\s+/g, '-').toLowerCase()}`;
            if (!document.getElementById(fontId)) {
                const linkElement = document.createElement('link');
                linkElement.id = fontId;
                linkElement.rel = 'stylesheet';
                linkElement.href = url;
                document.head.appendChild(linkElement);
            }
            document.body.style.fontFamily = `"${name}", sans-serif`;
        }

        function handleFontChange(chosenFont) {
            injectDynamicFont(chosenFont);
            showToast('success', 'Layout Dynamic Update', `Style matrices structural font changed to ${chosenFont}`);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get('teamId') || "matrix-alpha";
            const teamData = ecosystemDatabase[teamId];
            
            if (teamData) {
                injectDynamicFont(teamData.fontName);
                document.getElementById('font-selector').value = teamData.fontName;

                document.getElementById('team-name').innerText = teamData.name;
                document.getElementById('team-division').innerHTML = `<span class="w-1 h-1 rounded-full bg-emerald-500/80"></span> ${teamData.division}`;
                if(teamData.icon) document.getElementById('team-hub-icon').className = `${teamData.icon}`;

                // Process Standing Nodes with responsive layout dividers
                document.getElementById('standing-panel').innerHTML = `
                    <div class="w-full sm:flex-1"><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Position</p><p class="text-2xl font-black text-cyan-400 font-mono mt-0.5 tracking-tight">${teamData.standing.rank}</p></div>
                    <div class="hidden sm:block h-8 w-[1px] bg-slate-900"></div>
                    <div class="w-full sm:flex-1"><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Record Ratio</p><p class="text-sm font-bold text-slate-300 font-mono mt-1.5">${teamData.standing.winLoss}</p></div>
                    <div class="hidden sm:block h-8 w-[1px] bg-slate-900"></div>
                    <div class="w-full sm:flex-1"><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Ecosystem Score</p><p class="text-sm font-bold text-emerald-400 font-mono mt-1.5 tracking-wide">${teamData.standing.points}</p></div>
                `;

                // Compile Player Layout Cards
                const playersContainer = document.getElementById('players-container');
                playersContainer.innerHTML = "";
                teamData.players.forEach(p => {
                    playersContainer.innerHTML += `
                        <div class="bg-slate-950/60 border border-slate-900/60 p-3 rounded-xl flex justify-between items-center group hover:bg-slate-900/20 hover:border-slate-800/40 transition-all duration-200 w-full">
                            <div>
                                <h4 class="text-xs font-semibold text-slate-200 group-hover:text-white transition-colors">${p.name}</h4>
                                <p class="text-[10px] text-slate-500 mt-0.5">${p.role}</p>
                            </div>
                            <span class="text-[9px] font-mono font-bold bg-slate-900 border border-slate-800 text-slate-400 px-2 py-0.5 rounded-md shadow-sm shrink-0 ml-2">${p.rank}</span>
                        </div>
                    `;
                });

                // Generate Match Allocation Matrix
                const upcomingContainer = document.getElementById('upcoming-matches-container');
                const pastContainer = document.getElementById('past-matches-container');
                upcomingContainer.innerHTML = ""; pastContainer.innerHTML = "";
                let hasUpcoming = false, hasPast = false;

                teamData.matches.forEach(match => {
                    if (match.type === 'upcoming') {
                        hasUpcoming = true;
                        upcomingContainer.innerHTML += `
                            <div class="bg-slate-950/20 border border-slate-900/60 p-4 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 hover:border-slate-800/50 hover:bg-slate-950/40 transition-all duration-200">
                                <div class="space-y-1.5 w-full sm:w-auto">
                                    <span class="inline-block text-[8px] font-bold bg-cyan-500/10 text-cyan-400 border border-cyan-500/15 px-2 py-0.5 rounded uppercase tracking-wider">${match.tier}</span>
                                    <h3 class="text-sm font-bold text-slate-200"><span class="text-slate-500 font-normal text-xs">VS</span> ${match.opponent}</h3>
                                    <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-slate-400 text-[11px] font-medium">
                                        <span><i class="fa-regular fa-calendar text-[10px] mr-1 text-slate-600"></i>${match.date}</span>
                                        <span class="hidden sm:inline text-slate-800">•</span>
                                        <span><i class="fa-solid fa-location-dot text-[10px] mr-1 text-slate-600"></i>${match.court}</span>
                                    </div>
                                </div>
                                <div class="w-full sm:w-auto text-center font-mono font-bold text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-4 py-2 rounded-xl tracking-wide self-stretch sm:self-center flex items-center justify-center shrink-0">${match.time}</div>
                            </div>
                        `;
                    } else if (match.type === 'past') {
                        hasPast = true;
                        const matchStatusStyle = match.outcome === 'victory' ? 'border-l-2 border-emerald-500' : 'border-l-2 border-rose-500';
                        const matchBadgeStyle = match.outcome === 'victory' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/15' : 'bg-rose-500/10 text-rose-400 border-rose-500/15';
                        
                        pastContainer.innerHTML += `
                            <div class="bg-slate-950/15 border border-slate-900/50 ${matchStatusStyle} p-3.5 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 hover:border-slate-800/30 hover:bg-slate-950/30 transition-all duration-200">
                                <div class="space-y-1.5 w-full sm:w-auto">
                                    <span class="inline-block text-[8px] font-bold ${matchBadgeStyle} border px-2 py-0.5 rounded uppercase tracking-wider">${match.outcome}</span>
                                    <h3 class="text-xs font-semibold text-slate-300"><span class="text-slate-600 font-normal">VS</span> ${match.opponent}</h3>
                                    <p class="text-[10px] text-slate-500"><i class="fa-regular fa-clock mr-1 text-slate-700"></i>Processed ${match.date}</p>
                                </div>
                                <div class="text-xs font-bold tracking-wider font-mono bg-slate-950 border border-slate-900/80 px-3 py-1.5 rounded-lg text-slate-300 w-full sm:w-auto text-center sm:text-right shadow-sm shrink-0">${match.score}</div>
                            </div>
                        `;
                    }
                });

                if (!hasUpcoming) upcomingContainer.innerHTML = generateEmptyPlaceholder("No active schedules verified.");
                if (!hasPast) pastContainer.innerHTML = generateEmptyPlaceholder("No historical logs extracted.");
                showToast('success', 'Terminal Synced', `Node setup complete.`);
            } else {
                showToast('error', 'Handshake Failed', 'Parsed index vector mismatched database entities.');
                renderDisruptedUI();
            }
        });

        function generateEmptyPlaceholder(msg) {
            return `<div class="text-center py-6 text-slate-600 border border-dashed border-slate-900/80 rounded-xl text-xs font-medium tracking-wide bg-slate-950/10 w-full">${msg}</div>`;
        }

        function renderDisruptedUI() {
            document.getElementById('main-content-card').innerHTML = `
                <div class="text-center py-12 px-4">
                    <div class="inline-flex items-center justify-center w-14 h-14 bg-rose-500/10 border border-rose-500/20 text-rose-500 rounded-2xl mb-4 shadow-[0_0_20px_rgba(244,63,94,0.1)]"><i class="fa-solid fa-triangle-exclamation text-2xl"></i></div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-200">System Handshake Disrupted</h1>
                    <p class="text-slate-500 text-xs mt-2 max-w-xs mx-auto leading-relaxed font-medium">The QR configuration token contains an invalid unique dataset key routing mapping payload.</p>
                    <div class="mt-8"><a href="../login.html" class="bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-950 font-bold text-xs tracking-wider uppercase rounded-xl py-3 px-6 shadow-md transition-transform active:scale-98 inline-block">Return Gateway</a></div>
                </div>
            `;
        }

        function showToast(type, title, description) {
            const container = document.getElementById('toast-container');
            const id = 'toast-' + Date.now();
            const accentColor = type === 'error' ? 'border-rose-500' : 'border-emerald-400';
            const iconSet = type === 'error' ? 'fa-triangle-exclamation text-rose-500' : 'fa-circle-check text-emerald-400';

            const toastHtml = `
                <div id="${id}" class="toast-transition opacity-0 scale-95 translate-y-4 pointer-events-auto flex items-start gap-3 bg-slate-900/95 backdrop-blur-md border-l-2 ${accentColor} p-4 rounded-xl shadow-[0_15px_30px_rgba(0,0,0,0.4)] border border-slate-800/60 w-full relative overflow-hidden text-left">
                    <i class="fa-solid ${iconSet} mt-0.5 text-sm flex-shrink-0"></i>
                    <div class="flex-grow pr-4">
                        <h4 class="text-xs font-semibold text-slate-200 tracking-wide">${title}</h4>
                        <p class="text-[10px] text-slate-400 mt-0.5 leading-relaxed font-medium">${description}</p>
                    </div>
                    <button onclick="dismissToast('${id}')" class="text-slate-600 hover:text-slate-400 absolute top-3.5 right-3.5 text-xs"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', toastHtml);
            setTimeout(() => { document.getElementById(id)?.classList.remove('opacity-0', 'scale-95', 'translate-y-4'); }, 30);
            setTimeout(() => { dismissToast(id); }, 4000);
        }

        function dismissToast(id) {
            const element = document.getElementById(id);
            if(element) {
                element.classList.add('opacity-0', 'scale-95', 'translate-y-2');
                setTimeout(() => { element.remove(); }, 400);
            }
        }
    </script>
</body>
</html>
