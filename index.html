<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmashMatch - Badminton Matchmaking Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .shuttle-rotate { animation: spin 8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between antialiased selection:bg-emerald-500 selection:text-slate-900 relative overflow-hidden transition-opacity duration-700 ease-in-out" id="body-overlay">

    <!-- Top Decorative Background Highlights -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 opacity-10">
        <div class="absolute -top-20 -left-20 w-80 h-80 bg-emerald-500 rounded-full filter blur-3xl"></div>
        <div class="absolute top-1/3 -right-20 w-80 h-80 bg-cyan-500 rounded-full filter blur-3xl"></div>
    </div>

    <!-- Main Container -->
    <main class="flex-grow flex items-center justify-center p-4 z-10">
        <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl rounded-3xl p-8 border border-slate-700/50 shadow-2xl">
            
            <!-- App Logo & Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-emerald-500 to-cyan-400 rounded-2xl shadow-lg shadow-emerald-500/20 mb-4 transform hover:scale-105 transition-transform cursor-pointer">
                    <i class="fa-solid fa-shuttlecock text-slate-950 text-3xl shuttle-rotate"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">SmashMatch</h1>
                <p class="text-slate-400 text-sm mt-1">Sign in to find your perfect court partner</p>
            </div>

            <!-- Login Form -->
            <form id="auth-form" onsubmit="handleAuth(event)" novalidate>
                <div class="space-y-5">
                    
                    <!-- Email Input -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" id="email" required class="w-full bg-slate-900/60 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-sm" placeholder="player@smashmatch.com">
                        </div>
                        <span id="email-error" class="text-xs text-rose-400 mt-1 hidden">Please enter a valid email address</span>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                            <a href="#" class="text-xs text-cyan-400 hover:underline">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" id="password" required class="w-full bg-slate-900/60 border border-slate-700 rounded-xl py-3 pl-10 pr-10 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-sm" placeholder="••••••••">
                            <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-500 hover:text-slate-300">
                                <i id="password-toggle-icon" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <span id="password-error" class="text-xs text-rose-400 mt-1 hidden">Password must be at least 6 characters</span>
                    </div>

                </div>

                <!-- Submit Button with Dynamic Loading Content -->
                <button type="submit" id="submit-btn" class="w-full mt-8 bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-950 font-semibold rounded-xl py-3 shadow-lg shadow-emerald-500/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 min-h-[52px]">
                    <span id="btn-text">Sign In</span>
                    <i id="btn-icon" class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </form>

        </div>
    </main>

    <footer class="w-full text-center p-4 z-10 border-t border-slate-800/60 bg-slate-950/20 backdrop-blur-md text-xs text-slate-500">
        SmashMatch Badminton Matchmaking Engine
    </footer>

    <!-- Interactive Scripts -->
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Form Submission Logic
        function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const bodyOverlay = document.getElementById('body-overlay');
            
            let isValid = true;

            // Simple verification check
            if (!email || !email.includes('@')) {
                document.getElementById('email-error').classList.remove('hidden');
                isValid = false;
            } else { 
                document.getElementById('email-error').classList.add('hidden'); 
            }

            if (!password || password.length < 6) {
                document.getElementById('password-error').classList.remove('hidden');
                isValid = false;
            } else { 
                document.getElementById('password-error').classList.add('hidden'); 
            }

            // Route to target page if form validates correctly
            if (isValid) {
                // 1. Disable button to prevent double-clicks
                submitBtn.disabled = true;
                
                // 2. Inject loading spinner and state text
                btnText.innerText = "Authenticating";
                btnIcon.className = "fa-solid fa-circle-notch text-sm animate-spin";
                
                // 3. Wait 1.2 seconds for the mock loader effect, then trigger the fade out transition
                setTimeout(() => {
                    bodyOverlay.classList.add('opacity-0');
                    
                    // 4. Direct window location to target page after transition ends (700ms match)
                    setTimeout(() => {
                        window.location.href = './components/clubs.html';
                    }, 700);
                }, 1200);
            }
        }
    </script>
</body>
</html>
