<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmashMatch - Badminton Matchmaking Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .shuttle-rotate { animation: spin 20s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* Premium custom elastic transition cubic-bezier for toasts */
        .toast-transition { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between antialiased selection:bg-emerald-500 selection:text-slate-900 relative overflow-x-hidden transition-opacity duration-700 ease-in-out" id="body-overlay">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] z-0 opacity-40"></div>
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 opacity-30">
        <div class="absolute -top-40 -left-40 w-[30rem] h-[30rem] bg-emerald-500/20 rounded-full filter blur-[140px]"></div>
        <div class="absolute top-1/4 -right-40 w-[30rem] h-[30rem] bg-cyan-500/20 rounded-full filter blur-[140px]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-4 sm:p-6 md:p-8 z-10 relative">
        <div class="w-full max-w-sm sm:max-w-md bg-gradient-to-b from-slate-900/60 to-slate-900/20 backdrop-blur-3xl rounded-[2rem] p-6 sm:p-8 border border-slate-800/80 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] transition-all duration-300 hover:border-slate-700/40">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-emerald-500 to-cyan-400 rounded-2xl shadow-[0_0_30px_rgba(16,185,129,0.2)] mb-4 transform hover:scale-105 transition-transform duration-300 cursor-pointer group">
                    <i class="fa-solid fa-circle-nodes text-slate-950 text-2xl shuttle-rotate"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight bg-gradient-to-r from-emerald-400 via-teal-300 to-cyan-400 bg-clip-text text-transparent">SmashMatch</h1>
                <p class="text-slate-400/80 text-xs sm:text-sm mt-2 font-medium">Badminton Matchmaking Engine</p>
            </div>

            <div class="bg-slate-950/40 border border-slate-900/80 p-5 sm:p-6 rounded-2xl shadow-inner">
                <form id="auth-form" onsubmit="handleAuth(event)" novalidate class="space-y-5">
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Email Address</label>
                        <div class="relative group">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 group-focus-within:text-emerald-400 transition-colors duration-300">
                                <i class="fa-solid fa-envelope text-sm"></i>
                            </span>
                            <input type="email" id="email" required 
                                class="w-full bg-slate-950/60 border border-slate-800/80 rounded-xl py-3 pl-10 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all text-sm tracking-wide" 
                                placeholder="name@example.com">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest">Password</label>
                            <a href="#" class="text-xs font-semibold text-cyan-400/90 hover:text-cyan-300 transition-colors tracking-wide">Forgot?</a>
                        </div>
                        <div class="relative group">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 group-focus-within:text-emerald-400 transition-colors duration-300">
                                <i class="fa-solid fa-lock text-sm"></i>
                            </span>
                            <input type="password" id="password" required 
                                class="w-full bg-slate-950/60 border border-slate-800/80 rounded-xl py-3 pl-10 pr-10 text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all text-sm tracking-wide" 
                                placeholder="••••••••">
                            <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-500 hover:text-slate-300 transition-colors">
                                <i id="password-toggle-icon" class="fa-solid fa-eye text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-1">
                        <label class="flex items-center cursor-pointer select-none group text-xs text-slate-400 font-medium tracking-wide">
                            <input type="checkbox" class="sr-only peer">
                            <div class="w-4.5 h-4.5 bg-slate-950 border border-slate-800 rounded-md peer-checked:bg-emerald-500 peer-checked:border-emerald-500 flex items-center justify-center transition-all duration-200 mr-2.5 group-hover:border-slate-700">
                                <i class="fa-solid fa-check text-[9px] text-slate-950 opacity-0 peer-checked:opacity-100 transition-opacity duration-200"></i>
                            </div>
                            Keep me signed in
                        </label>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full mt-2 bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 text-slate-950 font-bold tracking-wide rounded-xl py-3 shadow-[0_4px_20px_rgba(16,185,129,0.15)] hover:opacity-95 hover:shadow-[0_4px_25px_rgba(16,185,129,0.25)] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 min-h-[48px]">
                        <span id="btn-text">Sign In</span>
                        <i id="btn-icon" class="fa-solid fa-arrow-right text-xs transition-transform duration-300 group-hover:translate-x-0.5"></i>
                    </button>
                </form>
            </div>

        </div>
    </main>

    <div class="fixed bottom-6 right-6 left-6 sm:left-auto sm:w-85 z-50 pointer-events-none">
        <div id="toast-container" class="space-y-3 flex flex-col justify-end items-end w-full">
            </div>
    </div>

    <footer class="w-full text-center p-5 z-10 border-t border-slate-900 bg-slate-950/60 backdrop-blur-md text-[10px] font-bold tracking-widest text-slate-600 uppercase">
        &copy; SmashMatch Engine Ecosystem
    </footer>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Custom Dynamic Toast Micro-Engine Component
        function showToast(type, title, description) {
            const container = document.getElementById('toast-container');
            const id = 'toast-' + Date.now();
            
            const accentColor = type === 'error' ? 'border-rose-500' : 'border-emerald-400';
            const iconSet = type === 'error' ? 'fa-triangle-exclamation text-rose-500' : 'fa-circle-check text-emerald-400';

            const toastHtml = `
                <div id="${id}" class="toast-transition opacity-0 scale-95 translate-y-4 pointer-events-auto flex items-start gap-3.5 bg-slate-900/90 backdrop-blur-md border-l-2 ${accentColor} p-4 rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.4)] border border-slate-800/80 w-full relative overflow-hidden text-left">
                    <i class="fa-solid ${iconSet} mt-0.5 text-base flex-shrink-0"></i>
                    <div class="flex-grow pr-4">
                        <h4 class="text-xs font-semibold text-slate-200 tracking-wide">${title}</h4>
                        <p class="text-[11px] text-slate-400/90 mt-1 leading-relaxed font-medium">${description}</p>
                    </div>
                    <button onclick="dismissToast('${id}')" class="text-slate-600 hover:text-slate-400 absolute top-3.5 right-3.5 text-xs transition-colors duration-150">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', toastHtml);
            
            // Layout reflow execution transition
            setTimeout(() => {
                const element = document.getElementById(id);
                if(element) {
                    element.classList.remove('opacity-0', 'scale-95', 'translate-y-4');
                }
            }, 30);

            // Global 4.5s lifespan configuration management
            setTimeout(() => { dismissToast(id); }, 4500);
        }

        function dismissToast(id) {
            const element = document.getElementById(id);
            if(element) {
                element.classList.add('opacity-0', 'scale-95', 'translate-y-2');
                setTimeout(() => { element.remove(); }, 400);
            }
        }

        // Validation Routing logic execution 
        function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const bodyOverlay = document.getElementById('body-overlay');
            
            let isValid = true;

            if (!email || !email.includes('@')) {
                showToast('error', 'Authentication Failed', 'The email format you supplied is invalid. Verify configuration syntax parameters.');
                isValid = false;
            }

            if (!password || password.length < 6) {
                showToast('error', 'Security Policy Rejection', 'Access denied. Account structural guidelines demand a minimum entry threshold of 6 characters.');
                isValid = false;
            }

            if (isValid) {
                submitBtn.disabled = true;
                btnText.innerText = "Connecting Framework";
                btnIcon.className = "fa-solid fa-circle-notch text-xs animate-spin";
                
                showToast('success', 'Handshake Initialized', 'Valid credentials analyzed. Syncing matchmaking telemetry data matrices...');

                setTimeout(() => {
                    bodyOverlay.classList.add('opacity-0');
                    setTimeout(() => {
                        window.location.href = './components/clubs.html';
                    }, 700);
                }, 1500);
            }
        }
    </script>
</body>
</html>
